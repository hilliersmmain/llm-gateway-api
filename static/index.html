<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Gateway</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">LLM Gateway</h2>
        <button id="newChatBtn" class="new-chat-btn" aria-label="Start a new chat">
          <i class="fas fa-plus"></i> New Chat
        </button>
      </div>

      <div class="history-list" id="historyList">
        <!-- History Items will be injected here -->
      </div>

      <div class="sidebar-footer">
        <div class="history-item" id="themeToggleBtn" role="button" aria-label="Toggle dark mode">
          <span><i class="fas fa-moon"></i> Dark Mode</span>
        </div>
        <a href="/docs" class="history-item" style="text-decoration: none" aria-label="View API documentation">
          <span><i class="fas fa-book"></i> API Docs</span>
        </a>
        <a
          href="/analytics?format=html"
          class="history-item"
          style="text-decoration: none"
          aria-label="View analytics dashboard"
        >
          <span><i class="fas fa-chart-bar"></i> Analytics</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="chat-header">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar menu">
          <i class="fas fa-bars"></i>
        </button>
        <h3 id="currentChatTitle" class="chat-title">New Conversation</h3>
      </div>

      <div id="chat-container">
        <!-- Messages will be injected by JavaScript -->
      </div>

      <div class="input-area">
        <div class="input-container">
          <textarea
            id="userInput"
            placeholder="Type your message..."
            rows="1"
            aria-label="Message input"
          ></textarea>
          <button id="send-btn" disabled aria-label="Send message">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
        <div class="input-disclaimer">
          AI can make mistakes. Please verify important information.
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
